<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f8f30" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%pwa/logo.jpg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Насенне" />
    <title>Насенне</title>
    <script>
      (function () {
        const redirect = sessionStorage.getItem('gh-pages-path');
        if (!redirect) return;
        sessionStorage.removeItem('gh-pages-path');
        const targetUrl = new URL(redirect, window.location.origin);
        window.history.replaceState(null, '', targetUrl.pathname + targetUrl.search + targetUrl.hash);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
